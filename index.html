<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انتقال به سایت مقصد</title>
    <!-- استایل‌های ساده برای لودر و صفحه -->
    <style>
        /* تنظیمات کلی صفحه */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            direction: rtl; /* پشتیبانی از زبان فارسی */
        }

        /* کارت اصلی شامل لودر و پیام */
        .card {
            background: #ffffff;
            padding: 2.5rem 3rem;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 8px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
            max-width: 420px;
            width: 90%;
            transition: all 0.2s ease;
        }

        h2 {
            font-weight: 500;
            font-size: 1.6rem;
            color: #1e293b;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .sub-text {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 1rem;
        }

        /* لودر دایره‌ای ساده با CSS */
        .loader-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1.2rem 0 0.5rem 0;
        }

        .loader {
            width: 58px;
            height: 58px;
            border: 5px solid #e2e8f0;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            display: inline-block;
        }

        /* انیمیشن چرخش */
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* پیام وضعیت */
        .status-message {
            margin-top: 1.5rem;
            color: #334155;
            font-size: 0.95rem;
            background: #f1f5f9;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            font-weight: 450;
        }

        /* لینک کمکی (در صورت عدم انتقال خودکار) */
        .manual-link {
            margin-top: 1.8rem;
            font-size: 0.9rem;
        }

        .manual-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dashed #94a3b8;
        }

        .manual-link a:hover {
            color: #1d4ed8;
            border-bottom: 1px solid #1d4ed8;
        }

        /* برای نمایش در صفحه‌های کوچک */
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 در حال انتقال</h2>
        <div class="sub-text">لطفاً چند لحظه صبر کنید...</div>

        <!-- لودر ساده دایره‌ای -->
        <div class="loader-wrapper">
            <div class="loader"></div>
        </div>

        <!-- پیام وضعیت (تغییر می‌کند) -->
        <div class="status-message" id="statusText">اتصال به سایت مقصد</div>

        <!-- در صورتی که انتقال خودکار انجام نشد، لینک دستی -->
        <div class="manual-link">
            <span>اگر انتقال خودکار انجام نشد، </span>
            <a href="https://klmh.mathlabpro.ir/" id="directLink">اینجا کلیک کنید</a>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // آدرس مقصد (همانطور که درخواست داده‌اید)
            const TARGET_URL = "https://klmh.mathlabpro.ir/";

            // المنت‌های DOM
            const statusEl = document.getElementById('statusText');
            const directLink = document.getElementById('directLink');

            // تابع به‌روزرسانی پیام وضعیت (اختیاری)
            function updateStatus(message) {
                if (statusEl) {
                    statusEl.textContent = message;
                }
            }

            // تابع انتقال با ریدایرکت
            function redirectToTarget() {
                try {
                    // ابتدا پیام را تغییر می‌دهیم
                    updateStatus('در حال انتقال به مقصد...');

                    // با کمی تاخیر (برای نمایش لودر و پیام) ریدایرکت می‌کنیم
                    // اما برای اینکه مطمئن شویم لودر دیده می‌شود، تاخیر 400 میلی‌ثانیه
                    // (اگر خیلی سریع باشد، شاید کاربر متوجه لودر نشود)
                    setTimeout(function() {
                        // ریدایرکت به آدرس مقصد
                        window.location.href = TARGET_URL;
                    }, 400); // 400ms تاخیر ملایم
                } catch (error) {
                    // در صورت بروز خطا (مثلاً مسدود شدن) پیام خطا نمایش داده شود
                    updateStatus('⚠️ خطا در انتقال - لطفاً روی لینک کلیک کنید');
                    console.warn('خطا در ریدایرکت:', error);
                }
            }

            // ===== اجرای اصلی =====
            // ۱. ابتدا پیام اولیه
            updateStatus('اتصال به سایت مقصد');

            // ۲. ریدایرکت خودکار پس از ۶۰۰ میلی‌ثانیه (تا لودر و پیام دیده شود)
            // اما اگر صفحه با تاخیر بارگذاری شد، باز هم کار می‌کند.
            // همچنین اگر کاربر روی لینک کلیک کند، باز هم به همانجا می‌رود.

            // شروع ریدایرکت خودکار
            const redirectTimer = setTimeout(function() {
                redirectToTarget();
            }, 600); // 600ms تاخیر برای نمایش زیبای لودر

            // ===== ایمنی: اگر کاربر در این بین صفحه را ترک کند، تایمر پاک می‌شود؟ =====
            // نیازی نیست چون ریدایرکت انجام می‌شود.

            // ===== در صورت کلیک روی لینک مستقیم، تایمر را پاک می‌کنیم تا دو بار ریدایرکت نشود =====
            if (directLink) {
                directLink.addEventListener('click', function(e) {
                    // تایمر ریدایرکت خودکار را لغو می‌کنیم (جلوی تداخل)
                    clearTimeout(redirectTimer);
                    // ولی اجازه می‌دهیم لینک به طور عادی کار کند (پیش‌فرض)
                    // پیام را به‌روز می‌کنیم
                    updateStatus('انتقال با کلیک شما...');
                });
            }

            // ===== (اختیاری) اگر صفحه برای مدت طولانی باز ماند، ریدایرکت دوباره؟ =====
            // ولی چون تایمر قبلی کار می‌کند، نیازی نیست.

            // یک نکته: اگر کاربر برگردد (Back) و دوباره این صفحه را ببیند،
            // دوباره ریدایرکت می‌شود (چون اسکریپت دوباره اجرا می‌شود) – این رفتار عادی است.

        })();
    </script>

    <!-- توضیح: کد بالا به محض ورود به سایت، با یک لودر ساده و پیام، 
         کاربر را به آدرس https://klmh.mathlabpro.ir/ منتقل می‌کند.
         لودر با CSS ساده پیاده‌سازی شده و پیام وضعیت نیز تغییر می‌کند.
         همچنین لینک دستی برای مواقع ضروری قرار داده شده است. -->
</body>
</html>
